version: 2
updates:
- package-ecosystem: gomod
  cooldown:
    default-days: 7
    exclude:
    - github.com/apple/pkl-go
  directories:
  - /buildtimeeval
  - /simple
  schedule:
    interval: weekly
- package-ecosystem: github-actions
  cooldown:
    default-days: 7
  directory: /
  ignore:
  - dependency-name: '*'
    update-types:
    - version-update:semver-major
  schedule:
    interval: weekly
